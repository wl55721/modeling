# DeepSeek-V3 model specification
# Reference: https://arxiv.org/pdf/2412.19437

name: deepseek-v3
hidden: 7168
ffn: 18432
num_heads: 128
num_kv_heads: 128       # MLA: projected back to num_heads KV
head_dim: 128           # qk_nope_head_dim only; effective MLA QK = qk_nope+qk_rope=192
vocab: 129280
seq_len: 4096
layers: "[dense]*3+[moe]*57+[mtp]*1"

# MLA (Multi-head Latent Attention)
q_lora_rank: 1536
kv_lora_rank: 512
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128

# MoE
num_experts: 256
moe_ffn: 2048           # per-expert FFN hidden
top_k: 8
n_group: 8              # group-limited gating
top_k_group: 4          # top-k groups selected
n_shared_experts: 1     # shared experts per MoE layer
capacity_factor: 1.0
expert_imbalance: 0.10
scoring_func: sigmoid

mtp_depth: 1
param_dtype: bf16
grad_dtype: fp32
master_dtype: fp32
act_dtype: bf16
