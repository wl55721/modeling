# DeepSeek-V4-Flash 3D parallel training — Ascend 910C
model: deepseek_v4_flash

system:
  hw: ascend_910c
  nodes: 4
  gpus_per_node: 8
  host_mem_gb: 2048

strategy:
  tp: 8
  cp: 1
  pp: 2
  ep: 32
  dp: 2
  micro_batch: 1
  global_batch: 256
  pp_schedule: 1f1b
  zero_stage: 1
  recompute:
    per_layer:
      moe: ["attn"]
  optimizer: muon
  muon_config:
    ns_steps: 10
    rotation: true
    adam_param_types: ["embed", "lm_head", "router", "bias"]
    muon_param_fraction: 0.85
