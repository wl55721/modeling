# DeepSeek-V3.2 3D parallel training — H100 SXM
model: deepseek_v3_2

system:
  hw: nvidia_h100_sxm
  nodes: 32
  gpus_per_node: 8
  host_mem_gb: 2048

strategy:
  tp: 8
  cp: 1
  pp: 8
  ep: 4
  dp: 4
  micro_batch: 1
  global_batch: 1024
  pp_schedule: dualpipev
  zero_stage: 1
  recompute:
    per_layer:
      moe: ["attn"]
  optimizer: muon
