# GraphCoarsenPass aggregation rules
# Schema: each rule defines how aten-level ops under a module scope are
# aggregated into a single block-level OpNode with FLOPs/memory formulas.
#
# Fields:
#   scope_pattern  : glob pattern matching OpNode.scope (module path)
#   spec_kind      : block-level operation kind (stored in attrs["spec_kind"])
#   op_type        : canonical op_type for the aggregated node
#   module_classes : list of module_class values that match this rule
#   flops_formula   : forward FLOPs formula (variables from shape_derivation)
#   memory_formula : memory bytes formula
#   grad_ratio     : {dx: float, dw: float} — backward FLOPs = fwd * ratio
#   priority       : higher wins when multiple rules match (default 0)
#
# Variables available in formulas:
#   B  = batch_size (from first input tensor shape[0])
#   S  = seq_len (from first input tensor shape[1], or numel/last_dim)
#   H  = hidden dim (from first input tensor shape[-1])
#   Ho = output hidden dim (from last output tensor shape[-1])
#   Hi = intermediate dim (from weight tensor shape[0] if available)
#   E  = num_experts (from metadata or scope)
#   K  = top_k (from metadata)
#   N  = num_heads (from metadata or H/head_dim)
#   D  = head_dim (from metadata)
#   R  = compress_ratio (from metadata)
#   Hc = hc_dim (from output shape[-1])
#   T  = num_tokens (= B * S)

# ─────────────────────────────────────────────────────────────────────────────
# 1. Embedding
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.embed_tokens"
  spec_kind: embed
  op_type: aten.embedding.default
  module_classes: [Embedding, ParallelEmbedding]
  priority: 10
  flops_formula: "0"
  memory_formula: "B * S * 8 + V * H * 2 + B * S * H * 2"
  grad_ratio: {dx: 0, dw: 0}
  annotations:
    component: embedding

- scope_pattern: "*.embed"
  spec_kind: embed
  op_type: aten.embedding.default
  module_classes: [ParallelEmbedding]
  priority: 10
  flops_formula: "0"
  memory_formula: "B * S * 8 + V * H * 2 + B * S * H * 2"
  grad_ratio: {dx: 0, dw: 0}
  annotations:
    component: embedding

# ─────────────────────────────────────────────────────────────────────────────
# 2. RMSNorm / LayerNorm
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.input_layernorm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm, LlamaRMSNorm, Qwen2RMSNorm, DeepseekV3RMSNorm]
  priority: 10
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

- scope_pattern: "*.post_attention_layernorm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm, LlamaRMSNorm, Qwen2RMSNorm, DeepseekV3RMSNorm]
  priority: 10
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

- scope_pattern: "*.attn_norm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm]
  priority: 10
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

- scope_pattern: "*.ffn_norm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm]
  priority: 10
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

- scope_pattern: "*.q_norm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm]
  priority: 10
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

- scope_pattern: "*.kv_norm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm]
  priority: 10
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

- scope_pattern: "*.norm"
  spec_kind: rmsnorm
  op_type: aten.rms_norm.default
  module_classes: [RMSNorm, LayerNorm]
  priority: 5
  flops_formula: "6 * B * S * H"
  memory_formula: "B * S * H * 2 + H * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: norm
    layer_norm_kind: rms

# ─────────────────────────────────────────────────────────────────────────────
# 3. Attention projections (standard HF naming)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.self_attn.q_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear, ColumnParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.self_attn.k_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear, ColumnParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.self_attn.v_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear, ColumnParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.self_attn.o_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear, RowParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

# ─────────────────────────────────────────────────────────────────────────────
# 4. Attention projections (V4 naming: wq_a, wq_b, wkv, wo_a, wo_b)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.attn.wq_a"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.attn.wq_b"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [ColumnParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.attn.wkv"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.attn.wo_a"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [ColumnParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.attn.wo_b"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [RowParallelLinear]
  priority: 10
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

# ─────────────────────────────────────────────────────────────────────────────
# 5. Attention core (parent scope — kernel ops at Attention module level)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.attn"
  spec_kind: attn_core
  op_type: aten.scaled_dot_product_attention.default
  module_classes: [Attention]
  priority: 20
  flops_formula: "6 * B * S * H * H + 2 * B * S * N * D * S"
  memory_formula: "B * S * H * 2 * 3 + B * S * H * 2"
  grad_ratio: {dx: 2.5, dw: 0}
  annotations:
    component: attention
    attention_kind: mla

# ─────────────────────────────────────────────────────────────────────────────
# 6. Compressor (KV compression for CSA/HCA)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.attn.compressor"
  spec_kind: compressor
  op_type: spec.compressor
  module_classes: [Compressor]
  priority: 15
  flops_formula: "4 * B * S * H * D + 8 * B * (S // R) * D"
  memory_formula: "B * S * H * 2 + B * (S // R) * D * 2 * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: kv_compressor

- scope_pattern: "*.attn.indexer.compressor"
  spec_kind: compressor
  op_type: spec.compressor
  module_classes: [Compressor]
  priority: 15
  flops_formula: "4 * B * S * H * D + 8 * B * (S // R) * D"
  memory_formula: "B * S * H * 2 + B * (S // R) * D * 2 * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: kv_compressor

# ─────────────────────────────────────────────────────────────────────────────
# 7. Indexer (sparse attention indexer)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.attn.indexer"
  spec_kind: indexer
  op_type: spec.indexer
  module_classes: [Indexer]
  priority: 15
  flops_formula: "2 * B * S * H * H + 2 * B * S * S * K"
  memory_formula: "B * S * H * 2 + B * S * K * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: sparse_indexer

# ─────────────────────────────────────────────────────────────────────────────
# 8. FFN projections (standard HF naming)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.mlp.gate_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 10
  flops_formula: "2 * B * S * H * Hi"
  memory_formula: "B * S * H * 2 + Hi * H * 2 + B * S * Hi * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: ffn

- scope_pattern: "*.mlp.up_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 10
  flops_formula: "2 * B * S * H * Hi"
  memory_formula: "B * S * H * 2 + Hi * H * 2 + B * S * Hi * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: ffn

- scope_pattern: "*.mlp.down_proj"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 10
  flops_formula: "2 * B * S * Hi * H"
  memory_formula: "B * S * Hi * 2 + H * Hi * 2 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: ffn

- scope_pattern: "*.mlp.act_fn"
  spec_kind: swiglu
  op_type: aten.silu.default
  module_classes: [SiLU, SwiGLU]
  priority: 10
  flops_formula: "2 * B * S * Hi"
  memory_formula: "B * S * Hi * 2 * 2 + B * S * Hi * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: ffn
    activation: swiglu

# ─────────────────────────────────────────────────────────────────────────────
# 9. MoE Gate (router)
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.ffn.gate"
  spec_kind: router
  op_type: aten.mm.default
  module_classes: [Gate]
  priority: 10
  flops_formula: "2 * B * S * H * E + B * S * E * 10"
  memory_formula: "B * S * H * 2 + E * H * 2 + B * S * K * 4"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: moe_gate

# ─────────────────────────────────────────────────────────────────────────────
# 10. MoE Experts (individual expert SwiGLU FFN)
#     Note: expert parent node only counts dispatch overhead.
#     The actual FFN FLOPs come from child nodes (w1/w2/w3 as aten.mm.default).
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.ffn.experts.*"
  spec_kind: expert
  op_type: spec.expert
  module_classes: [Expert]
  priority: 15
  flops_formula: "2 * B * S * H * K"
  memory_formula: "B * S * H * 2 + B * S * K * 4"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: moe_expert
    activation: swiglu

# ─────────────────────────────────────────────────────────────────────────────
# 11. Shared Experts
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.ffn.shared_experts"
  spec_kind: shared_expert
  op_type: spec.shared_expert
  module_classes: [Expert]
  priority: 15
  flops_formula: "6 * B * S * H * Hi + 2 * B * S * Hi"
  memory_formula: "B * S * H * 2 + Hi * H * 2 * 3 + B * S * H * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: shared_expert
    activation: swiglu

# ─────────────────────────────────────────────────────────────────────────────
# 12. Hyper-Connections (HC) modules
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.hc_pre_attn"
  spec_kind: mhc_pre
  op_type: spec.mhc_pre
  module_classes: [HCPreAttn]
  priority: 10
  flops_formula: "4 * B * S * H + 2 * B * S * H * Hc"
  memory_formula: "B * S * H * 2 + B * S * Hc * 2"
  grad_ratio: {dx: 2.5, dw: 1.0}
  annotations:
    component: hc

- scope_pattern: "*.hc_pre_ffn"
  spec_kind: mhc_pre
  op_type: spec.mhc_pre
  module_classes: [HCPreFfn]
  priority: 10
  flops_formula: "4 * B * S * H + 2 * B * S * H * Hc"
  memory_formula: "B * S * H * 2 + B * S * Hc * 2"
  grad_ratio: {dx: 2.5, dw: 1.0}
  annotations:
    component: hc

- scope_pattern: "*.hc_post_attn"
  spec_kind: mhc_post
  op_type: spec.mhc_post
  module_classes: [HCPostAttn]
  priority: 10
  flops_formula: "2 * B * S * H * Hc"
  memory_formula: "B * S * Hc * H * 2 + B * S * H * 2"
  grad_ratio: {dx: 2.5, dw: 0}
  annotations:
    component: hc

- scope_pattern: "*.hc_post_ffn"
  spec_kind: mhc_post
  op_type: spec.mhc_post
  module_classes: [HCPostFfn]
  priority: 10
  flops_formula: "2 * B * S * H * Hc"
  memory_formula: "B * S * Hc * H * 2 + B * S * H * 2"
  grad_ratio: {dx: 2.5, dw: 0}
  annotations:
    component: hc

- scope_pattern: "*.hc_head_module"
  spec_kind: mhc_head
  op_type: spec.mhc_head
  module_classes: [HCHead]
  priority: 10
  flops_formula: "4 * B * S * H + 2 * B * S * H * Hc + B * S * Hc"
  memory_formula: "B * S * H * 2 + B * S * Hc * 2"
  grad_ratio: {dx: 2.5, dw: 1.0}
  annotations:
    component: hc

# ─────────────────────────────────────────────────────────────────────────────
# 13. LM Head
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "lm_head"
  spec_kind: lm_head
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 10
  flops_formula: "2 * B * S * H * V"
  memory_formula: "B * S * H * 2 + V * H * 2 + B * S * V * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: lm_head

- scope_pattern: "*.head"
  spec_kind: lm_head
  op_type: aten.mm.default
  module_classes: [ParallelHead]
  priority: 10
  flops_formula: "2 * B * S * H * V"
  memory_formula: "B * S * H * 2 + V * H * 2 + B * S * V * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: lm_head

# ─────────────────────────────────────────────────────────────────────────────
# 14. Rotary Embedding
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.rotary_emb"
  spec_kind: rope
  op_type: aten.rope.default
  module_classes: [RotaryEmbedding, LlamaRotaryEmbedding]
  priority: 10
  flops_formula: "6 * B * S * N * D"
  memory_formula: "B * S * N * D * 2 * 2 + B * S * N * D * 2"
  grad_ratio: {dx: 1.0, dw: 0}
  annotations:
    component: attention

# ─────────────────────────────────────────────────────────────────────────────
# 15. Catch-all: Linear modules in attention/ffn scopes
# ─────────────────────────────────────────────────────────────────────────────
- scope_pattern: "*.self_attn.*"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear, ColumnParallelLinear, RowParallelLinear]
  priority: 1
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.attn.*"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear, ColumnParallelLinear, RowParallelLinear]
  priority: 1
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: attention

- scope_pattern: "*.mlp.*"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 1
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: ffn

- scope_pattern: "*.ffn.*"
  spec_kind: matmul
  op_type: aten.mm.default
  module_classes: [Linear]
  priority: 1
  flops_formula: "2 * B * S * H * Ho"
  memory_formula: "B * S * H * 2 + Ho * H * 2 + B * S * Ho * 2"
  grad_ratio: {dx: 1.0, dw: 1.0}
  annotations:
    component: ffn
